services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
      ARG CACHEBUST: "2"
    depends_on:
      - db
    environment:
      - HOST=db
      - USER=odoo
      - PASSWORD=odoo
      - DB_NAME=odoo-prod
    volumes:
      - odoo-web-data:/var/lib/odoo
    networks:
      - dokploy-network
  db:
    image: postgres:15
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_USER=odoo
      - POSTGRES_PASSWORD=odoo
    volumes:
      - odoo-db-data:/var/lib/postgresql/data
    networks:
      - dokploy-network
volumes:
  odoo-web-data:
  odoo-db-data:
networks:
  dokploy-network:
    external: true